<header
  class="w-full transition-all duration-300 md:rounded-sm md:shadow-lg"
  [class.bg-white]="scrolled()"
  [class.shadow-lg]="scrolled()"
>
  <div class="flex items-center justify-between p-4">
    <!-- LOGO -->
    <div class="flex items-center justify-between">
      <div
        class="hidden ml-15 text-3xl font-bold md:flex md:flex-row space-x-1"
      >
        <h2>Kay</h2>
        <h2 class="text-kl-red-light">Liguey</h2>
      </div>

      <!-- BURGER -->
      <button
        class="text-2xl md:hidden"
        aria-label="Toggle menu"
        (click)="toggleMenu()"
      >
        <!-- {{ isOpen() ? "ss " : "☰" }} -->

        @if (!isOpen()) {
          <lucide-icon
            name="menu"
            [size]="40"
            [strokeWidth]="2.25"
          ></lucide-icon>
        }
      </button>
    </div>

    <!-- NAV DESKTOP -->
    <nav class="hidden gap-6 md:flex">
      <a routerLink="/" routerLinkActive="active" class="nav-link">Accueil</a>
      <a routerLink="/offers" routerLinkActive="active" class="nav-link"
        >Offres</a
      >
      <a routerLink="/service" routerLinkActive="active" class="nav-link"
        >Services</a
      >
      <a routerLink="/blog" routerLinkActive="active" class="nav-link">Blog</a>
      <a routerLink="contact" routerLinkActive="active" class="nav-link"
        >Contact</a
      >
    </nav>

    <!-- BUTTONS -->
    <div
      class="hidden gap-4 md:flex md:flex-row items-center whitespace-nowrap"
    >
      <app-button variant="secondary" routerLink="/login"
        >Se connecter</app-button
      >
      <app-button variant="primary" routerLink="/register"
        >S'inscrire</app-button
      >
    </div>
  </div>
</header>

<!-- OVERLAY -->
@if (isOpen()) {
  <div class="fixed inset-0 z-40 bg-black/50" (click)="closeMenu()"></div>
}
<!-- SIDEBAR MOBILE -->
<div
  class="fixed top-0 left-0 z-50 h-full w-64 transform bg-white transition-transform duration-300 md:hidden rounded-sm p-3 shadow-lg"
  [class.translate-x-0]="isOpen()"
  [class.-translate-x-full]="!isOpen()"
>
  <div class="flex items-center border-b p-4 justify-start">
    <span class="font-bold"> </span>
    <!-- <button ="closeMenu()" aria-label="Close the menu">
      <lucide-icon name="x" [size]="40" [strokeWidth]="2.25"></lucide-icon>
    </button> -->
  </div>

  <nav
    class="flex flex-col gap-10 p-4 justify-center items-center mt-10 rounded-sm shadow-lg"
  >
    <a (click)="closeMenu()" routerLink="/">Accueil</a>
    <a (click)="closeMenu()" routerLink="/offres">Offres</a>
    <a (click)="closeMenu()" routerLink="/service">Services</a>
    <a (click)="closeMenu()" routerLink="/blog">Blog</a>
    <a (click)="closeMenu()" routerLink="/contact">Contact</a>
  </nav>

  <div class="flex flex-col gap-3 p-4 justify-center items-center mt-7">
    <app-button variant="primary" routerLink="/register">S'inscrire</app-button>
    <!-- <app-button variant="outline" routerLink="/login">Se connecter</app-button> -->
  </div>
</div>
