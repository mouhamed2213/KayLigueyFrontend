<div
  class="group mx-auto flex items-stretch w-full max-w-sm cursor-pointer flex-col gap-3 rounded-md border border-transparent bg-kl-card-surface p-6 shadow-sm transition-all duration-300 ease-out hover:-translate-y-1 hover:shadow-lg hover:border-kl-card-hover"
>
  <div
    class="w-fit rounded-lg bg-kl-red-100 p-3 transition-transform duration-300 group-hover:scale-110"
  >
    <ng-content [select]="icon"></ng-content>
  </div>

  <h3
    class="text-kl-text font-kl-headline text-lg font-bold transition-colors duration-300 group-hover:text-kl-red-light"
  >
    {{ title() }}
  </h3>

  <p class="text-kl-muted text-sm leading-relaxed">
    {{ descripiton() }}
  </p>
</div>
