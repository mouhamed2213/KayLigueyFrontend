<div
  class="group flex h-full w-full cursor-pointer flex-col gap-4 rounded-md border border-transparent bg-kl-card-surface p-6 shadow-sm transition-all duration-300 ease-out hover:-translate-y-1 hover:shadow-lg hover:border-kl-card-hover"
>
  <!-- HEADER -->
  <div class="flex items-start justify-between">
    <!-- ICON -->
    <div
      class="w-fit rounded-lg bg-kl-red-100 p-3 transition-transform duration-300 group-hover:scale-110"
    >
      <ng-content select="[card-icon]"></ng-content>
    </div>

    <!-- BADGE (optionnel) -->
    <span>
      <ng-content select="[card-badge]"></ng-content>
    </span>
  </div>

  <!-- TITLE -->
  <h3
    class="text-kl-text text-lg font-bold transition-colors duration-300 group-hover:text-kl-red-light"
  >
    <ng-content select="[card-title]"></ng-content>
  </h3>

  <!-- CONTENT -->
  <div class="flex flex-col gap-2 flex-1">
    <ng-content select="[card-content]"></ng-content>
  </div>

  <!-- FOOTER -->
  <div class="mt-auto">
    <ng-content select="[card-footer]"></ng-content>
  </div>
</div>
